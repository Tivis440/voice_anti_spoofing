<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Архитектура MLP-модели</title>
  <desc id="desc">Архитектура MLP-модели для задачи детектирования синтезированной речи: 77 входных признаков, два скрытых слоя 192 и 96 нейронов, выходной слой по числу классов.</desc>
  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .frame { fill: #ffffff; stroke: #c9d2df; stroke-width: 2; }
      .block { fill: #ffffff; stroke: #7d8ca3; stroke-width: 2.2; }
      .input { fill: #e8f1fb; stroke: #5b84b1; stroke-width: 2; }
      .hidden { fill: #eef0f5; stroke: #6f7890; stroke-width: 2; }
      .output { fill: #eef7ef; stroke: #5d8a65; stroke-width: 2; }
      .title { font: 700 34px 'Times New Roman', Georgia, serif; fill: #1e2b3a; }
      .subtitle { font: 400 19px 'Times New Roman', Georgia, serif; fill: #4f6278; }
      .section { font: 700 18px 'Times New Roman', Georgia, serif; fill: #243447; letter-spacing: 0.8px; }
      .label { font: 700 22px 'Times New Roman', Georgia, serif; fill: #1f2d3d; }
      .small { font: 400 17px 'Times New Roman', Georgia, serif; fill: #46596e; }
      .mini { font: 400 15px 'Times New Roman', Georgia, serif; fill: #4e6174; }
      .chip { font: 600 15px 'Times New Roman', Georgia, serif; fill: #253445; }
      .line { stroke: #8a99ad; stroke-width: 2.2; }
      .line-soft { stroke: #b0bccb; stroke-width: 1.8; }
    </style>
  </defs>

  <rect width="1600" height="900" class="bg"/>
  <rect x="54" y="54" width="1492" height="792" rx="14" class="frame"/>

  <text x="100" y="110" class="title">Архитектура многослойного персептрона (FeatureMLP)</text>
  <text x="100" y="145" class="subtitle">Модель классификации аудиозаписей по инженерным признакам для детектирования синтезированной речи</text>

  <g transform="translate(105,220)">
    <rect x="0" y="0" width="320" height="500" rx="12" class="block"/>
    <text x="28" y="40" class="section">ВХОДНОЙ СЛОЙ</text>
    <circle cx="160" cy="120" r="32" class="input"/>
    <circle cx="160" cy="190" r="32" class="input"/>
    <circle cx="160" cy="260" r="32" class="input"/>
    <circle cx="160" cy="330" r="32" class="input"/>
    <text x="160" y="410" text-anchor="middle" class="label">77 признаков</text>
    <text x="160" y="440" text-anchor="middle" class="small">MFCC, дельты, спектральные признаки,</text>
    <text x="160" y="465" text-anchor="middle" class="small">ZCR, RMS, энергетический признак</text>
  </g>

  <g transform="translate(495,195)">
    <rect x="0" y="0" width="270" height="550" rx="12" class="block"/>
    <text x="28" y="40" class="section">СКРЫТЫЙ СЛОЙ 1</text>
    <circle cx="135" cy="115" r="27" class="hidden"/>
    <circle cx="135" cy="170" r="27" class="hidden"/>
    <circle cx="135" cy="225" r="27" class="hidden"/>
    <circle cx="135" cy="280" r="27" class="hidden"/>
    <circle cx="135" cy="335" r="27" class="hidden"/>
    <text x="135" y="405" text-anchor="middle" class="label">192 нейрона</text>
    <rect x="44" y="444" width="182" height="36" rx="8" class="input"/>
    <text x="135" y="467" text-anchor="middle" class="chip">Линейный слой + ReLU</text>
    <rect x="44" y="492" width="182" height="36" rx="8" class="input"/>
    <text x="135" y="515" text-anchor="middle" class="chip">BatchNorm + Dropout</text>
  </g>

  <g transform="translate(845,230)">
    <rect x="0" y="0" width="245" height="480" rx="12" class="block"/>
    <text x="28" y="40" class="section">СКРЫТЫЙ СЛОЙ 2</text>
    <circle cx="122" cy="125" r="24" class="hidden"/>
    <circle cx="122" cy="180" r="24" class="hidden"/>
    <circle cx="122" cy="235" r="24" class="hidden"/>
    <circle cx="122" cy="290" r="24" class="hidden"/>
    <text x="122" y="355" text-anchor="middle" class="label">96 нейронов</text>
    <rect x="32" y="395" width="180" height="36" rx="8" class="input"/>
    <text x="122" y="418" text-anchor="middle" class="chip">Линейный слой + ReLU</text>
    <rect x="32" y="442" width="180" height="36" rx="8" class="input"/>
    <text x="122" y="465" text-anchor="middle" class="chip">BatchNorm + Dropout</text>
  </g>

  <g transform="translate(1170,245)">
    <rect x="0" y="0" width="300" height="450" rx="12" class="block"/>
    <text x="28" y="40" class="section">ВЫХОДНОЙ СЛОЙ</text>
    <circle cx="88" cy="125" r="22" class="output"/>
    <circle cx="88" cy="185" r="22" class="output"/>
    <circle cx="88" cy="245" r="22" class="output"/>
    <text x="176" y="132" class="label">real</text>
    <text x="176" y="192" class="label">fake_coqui</text>
    <text x="176" y="252" class="label">fake_silero</text>
    <text x="150" y="325" text-anchor="middle" class="label">Число классов</text>
    <rect x="58" y="362" width="184" height="36" rx="8" class="output"/>
    <text x="150" y="385" text-anchor="middle" class="chip">Линейный слой + Softmax</text>
  </g>

  <line x1="425" y1="390" x2="495" y2="390" class="line"/>
  <line x1="765" y1="390" x2="845" y2="390" class="line"/>
  <line x1="1090" y1="390" x2="1170" y2="390" class="line"/>

  <line x1="425" y1="320" x2="495" y2="320" class="line-soft"/>
  <line x1="425" y1="460" x2="495" y2="460" class="line-soft"/>
  <line x1="765" y1="320" x2="845" y2="320" class="line-soft"/>
  <line x1="765" y1="460" x2="845" y2="460" class="line-soft"/>

  <g transform="translate(104,760)">
    <rect x="0" y="0" width="1364" height="58" rx="10" class="frame"/>
    <text x="24" y="25" class="mini">Текущая конфигурация модели:</text>
    <text x="24" y="47" class="mini">Вход: 77 признаков | Первый скрытый слой: 192 | Второй скрытый слой: 96 | Dropout: 0.1 | Выход: вероятности классов</text>
    <text x="860" y="25" class="mini">Назначение:</text>
    <text x="860" y="47" class="mini">Классификация аудиофайла как real или fake по инженерным акустическим признакам</text>
  </g>
</svg>
