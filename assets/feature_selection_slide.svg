<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img"
  aria-labelledby="title desc">
  <title id="title">Выбор используемых признаков</title>
  <desc id="desc">Слайд о выборе признаков для детектирования синтезированной речи с увеличенными отступами и
    компактными текстовыми блоками.</desc>
  <defs>
    <style>
      .bg {
        fill: #f4f6f9;
      }

      .frame {
        fill: #ffffff;
        stroke: #c8d1db;
        stroke-width: 2;
      }

      .card {
        fill: #ffffff;
        stroke: #8696a8;
        stroke-width: 2;
      }

      .innerBlue {
        fill: #e9f2fb;
        stroke: #5f85b3;
        stroke-width: 1.8;
      }

      .innerGreen {
        fill: #edf7ef;
        stroke: #6a8f6e;
        stroke-width: 1.8;
      }

      .innerGray {
        fill: #f1f3f6;
        stroke: #8b94a3;
        stroke-width: 1.8;
      }

      .accent {
        fill: #f8fbff;
        stroke: #4d6e93;
        stroke-width: 2.2;
      }

      .chip {
        fill: #eef3f8;
        stroke: #9babbc;
        stroke-width: 1.2;
      }

      .chipGreen {
        fill: #edf7ef;
        stroke: #6a8f6e;
        stroke-width: 1.2;
      }

      .title {
        font: 700 34px 'Times New Roman', Georgia, serif;
        fill: #1e2b39;
      }

      .subtitle {
        font: 400 19px 'Times New Roman', Georgia, serif;
        fill: #526579;
      }

      .section {
        font: 700 20px 'Times New Roman', Georgia, serif;
        fill: #263546;
      }

      .strong {
        font: 700 18px 'Times New Roman', Georgia, serif;
        fill: #243447;
      }

      .body {
        font: 400 15px 'Times New Roman', Georgia, serif;
        fill: #42556b;
      }

      .small {
        font: 400 13px 'Times New Roman', Georgia, serif;
        fill: #506276;
      }

      .axis {
        stroke: #98a6b5;
        stroke-width: 1.5;
      }

      .line1 {
        stroke: #2d6cdf;
        stroke-width: 3;
        fill: none;
      }

      .line2 {
        stroke: #4e7a56;
        stroke-width: 3;
        fill: none;
      }

      .line3 {
        stroke: #6e7e90;
        stroke-width: 3;
        fill: none;
      }

      .bar {
        fill: #8fb5df;
      }

      .bar2 {
        fill: #a6c6eb;
      }

      .heat1 {
        fill: #dce9f7;
      }

      .heat2 {
        fill: #b9d2ec;
      }

      .heat3 {
        fill: #87abd8;
      }

      .heat4 {
        fill: #557faf;
      }

      .arrow {
        stroke: #70839a;
        stroke-width: 2.2;
        fill: none;
        marker-end: url(#arr);
      }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#70839a" />
    </marker>
  </defs>

  <rect width="1600" height="900" class="bg" />
  <rect x="48" y="48" width="1504" height="804" rx="14" class="frame" />

  <text x="92" y="108" class="title">Выбор используемых признаков</text>
  <text x="92" y="142" class="subtitle">Выбраны признаки, которые описывают спектр, динамику и энергетику речевого
    сигнала</text>

  <g transform="translate(92,195)">
    <rect x="0" y="0" width="438" height="330" rx="12" class="card" />
    <text x="24" y="36" class="section">1. Мел-кепстральные признаки и динамика</text>

    <rect x="24" y="64" width="164" height="116" class="innerGray" />
    <line x1="46" y1="160" x2="166" y2="160" class="axis" />
    <path d="M 50 118 C 66 84, 78 84, 94 118 S 124 160, 138 126 S 152 96, 166 118" class="line1" />
    <text x="106" y="204" text-anchor="middle" class="small">Сигнал</text>

    <path d="M 196 122 L 232 122" class="arrow" />

    <rect x="244" y="64" width="170" height="116" class="innerBlue" />
    <rect x="258" y="78" width="22" height="22" class="heat1" />
    <rect x="282" y="78" width="22" height="22" class="heat2" />
    <rect x="306" y="78" width="22" height="22" class="heat3" />
    <rect x="330" y="78" width="22" height="22" class="heat2" />
    <rect x="354" y="78" width="22" height="22" class="heat1" />
    <rect x="378" y="78" width="22" height="22" class="heat4" />
    <rect x="258" y="104" width="22" height="22" class="heat2" />
    <rect x="282" y="104" width="22" height="22" class="heat3" />
    <rect x="306" y="104" width="22" height="22" class="heat4" />
    <rect x="330" y="104" width="22" height="22" class="heat3" />
    <rect x="354" y="104" width="22" height="22" class="heat2" />
    <rect x="378" y="104" width="22" height="22" class="heat2" />
    <rect x="258" y="130" width="22" height="22" class="heat3" />
    <rect x="282" y="130" width="22" height="22" class="heat4" />
    <rect x="306" y="130" width="22" height="22" class="heat3" />
    <rect x="330" y="130" width="22" height="22" class="heat2" />
    <rect x="354" y="130" width="22" height="22" class="heat1" />
    <rect x="378" y="130" width="22" height="22" class="heat2" />
    <text x="329" y="204" text-anchor="middle" class="small">Мел-кепстральное описание</text>

    <text x="24" y="246" class="body">Описывают тембр и форму спектра речи.</text>
    <text x="24" y="270" class="body">Первая и вторая производные отражают</text>
    <text x="24" y="292" class="body">изменение этих признаков во времени.</text>
  </g>

  <g transform="translate(581,195)">
    <rect x="0" y="0" width="438" height="330" rx="12" class="card" />
    <text x="24" y="36" class="section">2. Спектральные признаки</text>

    <rect x="24" y="64" width="172" height="116" class="innerGray" />
    <line x1="42" y1="160" x2="180" y2="160" class="axis" />
    <line x1="42" y1="160" x2="42" y2="82" class="axis" />
    <rect x="62" y="138" width="16" height="22" class="bar2" />
    <rect x="84" y="126" width="16" height="34" class="bar2" />
    <rect x="106" y="92" width="16" height="68" class="bar" />
    <rect x="128" y="74" width="16" height="86" class="bar" />
    <rect x="150" y="116" width="16" height="44" class="bar2" />
    <line x1="136" y1="82" x2="136" y2="160" class="line1" />
    <line x1="160" y1="82" x2="160" y2="160" class="line2" />
    <text x="110" y="204" text-anchor="middle" class="small">Спектр</text>

    <rect x="220" y="56" width="196" height="175" class="innerGreen" />
    <text x="246" y="84" class="strong">Используются:</text>
    <text x="246" y="112" class="body">• спектральный центроид</text>
    <text x="246" y="138" class="body">• спектральная ширина</text>
    <text x="246" y="160" class="body">• граничная частота</text>
    <text x="256" y="180" class="body">энергии</text>
    <text x="246" y="204" class="body">• спектральная</text>
    <text x="256" y="224" class="body">плоскостность</text>

    <text x="24" y="266" class="body">Показывают, где находится энергия,</text>
    <text x="24" y="290" class="body">насколько спектр широк и насколько</text>
    <text x="24" y="312" class="body">сигнал похож на шум или структуру.</text>
  </g>

  <g transform="translate(1070,195)">
    <rect x="0" y="0" width="438" height="330" rx="12" class="card" />
    <text x="24" y="36" class="section">3. Временные и энергетические признаки</text>

    <rect x="24" y="64" width="188" height="116" class="innerGray" />
    <line x1="42" y1="160" x2="188" y2="160" class="axis" />
    <path d="M 44 126 L 68 88 L 92 150 L 116 76 L 140 144 L 164 98 L 186 138" class="line3" />
    <line x1="92" y1="82" x2="92" y2="160" class="line2" />
    <line x1="140" y1="82" x2="140" y2="160" class="line2" />
    <text x="118" y="204" text-anchor="middle" class="small">Динамика</text>

    <rect x="228" y="56" width="188" height="175" class="innerBlue" />
    <text x="254" y="84" class="strong">Используются:</text>
    <text x="244" y="112" class="body">• частота пересечения</text>
    <text x="262" y="132" class="body">нуля</text>
    <text x="244" y="158" class="body">• среднеквадратичная</text>
    <text x="262" y="178" class="body">амплитуда</text>
    <text x="244" y="204" class="body">• отношение спектральной</text>
    <text x="262" y="224" class="body">и общей энергии</text>

    <text x="24" y="266" class="body">Описывают число пересечений нуля,</text>
    <text x="24" y="290" class="body">среднюю энергию и соотношение</text>
    <text x="24" y="312" class="body">между спектром и общей энергией.</text>
  </g>

  <g transform="translate(92,540)">
    <rect x="0" y="0" width="1416" height="214" rx="12" class="accent" />
    <text x="24" y="38" class="section">4. Итог выбора</text>

    <rect x="24" y="62" width="300" height="124" rx="10" class="chip" />
    <text x="44" y="92" class="strong">Почему этот набор</text>
    <text x="44" y="120" class="body">Интерпретируемый, компактный</text>
    <text x="44" y="142" class="body">и чувствительный к различиям</text>
    <text x="44" y="164" class="body">между реальной и синтетической речью.</text>

    <rect x="372" y="62" width="300" height="124" rx="10" class="chip" />
    <text x="392" y="92" class="strong">Что покрывает</text>
    <text x="392" y="120" class="body">Тембр, динамику, частотную</text>
    <text x="392" y="142" class="body">структуру и энергетику сигнала.</text>

    <rect x="720" y="62" width="300" height="124" rx="10" class="chip" />
    <text x="740" y="92" class="strong">Практический смысл</text>
    <text x="740" y="120" class="body">Позволяет отличать естественную</text>
    <text x="740" y="142" class="body">речь от слишком ровной</text>
    <text x="740" y="164" class="body">или искусственной синтетики.</text>

    <rect x="1068" y="62" width="324" height="124" rx="10" class="chipGreen" />
    <text x="1088" y="92" class="strong">Текущий итоговый вектор</text>
    <text x="1088" y="120" class="body">При n_mfcc = 13 используется 77 признаков:</text>
    <text x="1088" y="142" class="body">52 мел-кепстральных, 16 спектральных,</text>
    <text x="1088" y="164" class="body">8 временных и 1 энергетический.</text>

    <text x="24" y="206" class="small">Итоговый набор признаков выбран как компромисс между качеством, устойчивостью
      модели и понятностью интерпретации.</text>
  </g>
</svg>