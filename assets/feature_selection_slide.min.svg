<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" aria-labelledby="title desc"><defs><marker id="prefix__arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0l10 5-10 5z" fill="#70839a"/></marker><style>.prefix__card{fill:#fff;stroke:#8696a8;stroke-width:2}.prefix__innerBlue,.prefix__innerGray{fill:#e9f2fb;stroke:#5f85b3;stroke-width:1.8}.prefix__innerGray{fill:#f1f3f6;stroke:#8b94a3}.prefix__chip{fill:#eef3f8;stroke:#9babbc;stroke-width:1.2}.prefix__section{font:700 20px &apos;Times New Roman&apos;,Georgia,serif;fill:#263546}.prefix__strong{font:700 18px &apos;Times New Roman&apos;,Georgia,serif;fill:#243447}.prefix__body{font:400 15px &apos;Times New Roman&apos;,Georgia,serif;fill:#42556b}.prefix__small{font:400 13px &apos;Times New Roman&apos;,Georgia,serif;fill:#506276}.prefix__axis{stroke:#98a6b5;stroke-width:1.5}.prefix__line1,.prefix__line2{stroke:#2d6cdf;stroke-width:3;fill:none}.prefix__line2{stroke:#4e7a56}.prefix__bar{fill:#8fb5df}.prefix__bar2{fill:#a6c6eb}.prefix__heat1{fill:#dce9f7}.prefix__heat2{fill:#b9d2ec}.prefix__heat3{fill:#87abd8}.prefix__heat4{fill:#557faf}</style></defs><path fill="#f4f6f9" d="M0 0h1600v900H0z"/><rect x="48" y="48" width="1504" height="804" rx="14" fill="#fff" stroke="#c8d1db" stroke-width="2"/><text x="92" y="108" style="font:700 34px 'Times New Roman',Georgia,serif" fill="#1e2b39">Выбор используемых признаков</text><text x="92" y="142" style="font:400 19px 'Times New Roman',Georgia,serif" fill="#526579">Выбраны признаки, которые описывают спектр, динамику и энергетику речевого сигнала</text><g transform="translate(92 195)"><rect width="438" height="304" rx="12" class="prefix__card"/><text x="24" y="36" class="prefix__section">1. Мел-кепстральные признаки и динамика</text><path class="prefix__innerGray" d="M24 64h164v116H24z"/><path class="prefix__axis" d="M46 160h120"/><path d="M50 118c16-34 28-34 44 0s30 42 44 8 14-30 28-8" class="prefix__line1"/><text x="106" y="204" text-anchor="middle" class="prefix__small">Сигнал</text><path d="M196 122h36" stroke="#70839a" stroke-width="2.2" fill="none" marker-end="url(#prefix__arr)"/><path class="prefix__innerBlue" d="M244 64h170v116H244z"/><path class="prefix__heat1" d="M258 78h22v22h-22z"/><path class="prefix__heat2" d="M282 78h22v22h-22z"/><path class="prefix__heat3" d="M306 78h22v22h-22z"/><path class="prefix__heat2" d="M330 78h22v22h-22z"/><path class="prefix__heat1" d="M354 78h22v22h-22z"/><path class="prefix__heat4" d="M378 78h22v22h-22z"/><path class="prefix__heat2" d="M258 104h22v22h-22z"/><path class="prefix__heat3" d="M282 104h22v22h-22z"/><path class="prefix__heat4" d="M306 104h22v22h-22z"/><path class="prefix__heat3" d="M330 104h22v22h-22z"/><path class="prefix__heat2" d="M354 104h22v22h-22zM378 104h22v22h-22z"/><path class="prefix__heat3" d="M258 130h22v22h-22z"/><path class="prefix__heat4" d="M282 130h22v22h-22z"/><path class="prefix__heat3" d="M306 130h22v22h-22z"/><path class="prefix__heat2" d="M330 130h22v22h-22z"/><path class="prefix__heat1" d="M354 130h22v22h-22z"/><path class="prefix__heat2" d="M378 130h22v22h-22z"/><text x="329" y="204" text-anchor="middle" class="prefix__small">Мел-кепстральное описание</text><text x="24" y="246" class="prefix__body">Описывают тембр и форму спектра речи.</text><text x="24" y="270" class="prefix__body">Первая и вторая производные отражают</text><text x="24" y="292" class="prefix__body">изменение этих признаков во времени.</text></g><g transform="translate(581 195)"><rect width="438" height="330" rx="12" class="prefix__card"/><text x="24" y="36" class="prefix__section">2. Спектральные признаки</text><path class="prefix__innerGray" d="M24 64h172v116H24z"/><path class="prefix__axis" d="M42 160h138M42 160V82"/><path class="prefix__bar2" d="M62 138h16v22H62zM84 126h16v34H84z"/><path class="prefix__bar" d="M106 92h16v68h-16zM128 74h16v86h-16z"/><path class="prefix__bar2" d="M150 116h16v44h-16z"/><path class="prefix__line1" d="M136 82v78"/><path class="prefix__line2" d="M160 82v78"/><text x="110" y="204" text-anchor="middle" class="prefix__small">Спектр</text><path fill="#edf7ef" stroke="#6a8f6e" stroke-width="1.8" d="M220 56h196v150H220z"/><text x="246" y="84" class="prefix__strong">Используются:</text><text x="246" y="112" class="prefix__body">• спектральный центроид</text><text x="246" y="138" class="prefix__body">• спектральная ширина</text><text x="238" y="160" class="prefix__body">• граничная частота</text><text x="256" y="180" class="prefix__body">энергии</text><text x="238" y="204" class="prefix__body">• спектральная</text><text x="256" y="224" class="prefix__body">плоскостность</text><text x="24" y="266" class="prefix__body">Показывают, где находится энергия,</text><text x="24" y="290" class="prefix__body">насколько спектр широк и насколько</text><text x="24" y="312" class="prefix__body">сигнал похож на шум или структуру.</text></g><g transform="translate(1070 195)"><rect width="438" height="330" rx="12" class="prefix__card"/><text x="24" y="36" class="prefix__section">3. Временные и энергетические признаки</text><path class="prefix__innerGray" d="M24 64h188v116H24z"/><path class="prefix__axis" d="M42 160h146"/><path d="M44 126l24-38 24 62 24-74 24 68 24-46 22 40" stroke="#6e7e90" stroke-width="3" fill="none"/><path class="prefix__line2" d="M92 82v78M140 82v78"/><text x="118" y="204" text-anchor="middle" class="prefix__small">Динамика</text><path class="prefix__innerBlue" d="M228 56h188v168H228z"/><text x="254" y="84" class="prefix__strong">Используются:</text><text x="244" y="112" class="prefix__body">• частота пересечения</text><text x="262" y="132" class="prefix__body">нуля</text><text x="244" y="158" class="prefix__body">• среднеквадратичная</text><text x="262" y="178" class="prefix__body">амплитуда</text><text x="244" y="204" class="prefix__body">• отношение спектральной</text><text x="262" y="224" class="prefix__body">и общей энергии</text><text x="24" y="266" class="prefix__body">Описывают число пересечений нуля,</text><text x="24" y="290" class="prefix__body">среднюю энергию и соотношение</text><text x="24" y="312" class="prefix__body">между спектром и общей энергией.</text></g><g transform="translate(92 540)"><rect width="1416" height="214" rx="12" fill="#f8fbff" stroke="#4d6e93" stroke-width="2.2"/><text x="24" y="38" class="prefix__section">4. Итог выбора</text><rect x="24" y="62" width="300" height="124" rx="10" class="prefix__chip"/><text x="44" y="92" class="prefix__strong">Почему этот набор</text><text x="44" y="120" class="prefix__body">Интерпретируемый, компактный</text><text x="44" y="142" class="prefix__body">и чувствительный к различиям</text><text x="44" y="164" class="prefix__body">между реальной и синтетической речью.</text><rect x="372" y="62" width="300" height="124" rx="10" class="prefix__chip"/><text x="392" y="92" class="prefix__strong">Что покрывает</text><text x="392" y="120" class="prefix__body">Тембр, динамику, частотную</text><text x="392" y="142" class="prefix__body">структуру и энергетику сигнала.</text><rect x="720" y="62" width="300" height="124" rx="10" class="prefix__chip"/><text x="740" y="92" class="prefix__strong">Практический смысл</text><text x="740" y="120" class="prefix__body">Позволяет отличать естественную</text><text x="740" y="142" class="prefix__body">речь от слишком ровной</text><text x="740" y="164" class="prefix__body">или искусственной синтетики.</text><rect x="1068" y="62" width="324" height="124" rx="10" fill="#edf7ef" stroke="#6a8f6e" stroke-width="1.2"/><text x="1088" y="92" class="prefix__strong">Текущий итоговый вектор</text><text x="1088" y="120" class="prefix__body">При n_mfcc = 13 используется 77 признаков:</text><text x="1088" y="142" class="prefix__body">52 мел-кепстральных, 16 спектральных,</text><text x="1088" y="164" class="prefix__body">8 временных и 1 энергетический.</text><text x="24" y="206" class="prefix__small">Итоговый набор признаков выбран как компромисс между качеством, устойчивостью модели и понятностью интерпретации.</text></g></svg>